spring:
  profiles:
    active: dev

  application:
    name: empik-discount-coupon

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/app}
    username: ${DATASOURCE_USERNAME:app}
    password: ${DATASOURCE_PASSWORD:app}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      slo:
        http:server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s
    tags:
      application: ${spring.application.name}
      enable:
        jvm: true
        application: true
        http: true
        tomcat: true
        http.client.requests: true

logging:
  level:
    pl.awaitq.empikdc: DEBUG
    org.springframework.cache: TRACE

app:
  cache:
    enabled: true
