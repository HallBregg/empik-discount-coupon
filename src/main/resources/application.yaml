spring:
  profiles:
    active: dev

  application:
    name: empik-discount-coupon

  datasource:
    url: jdbc:postgresql://localhost:5432/app
    username: app
    password: app
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    pl.awaitq.empikdc: DEBUG
